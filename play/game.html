<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>飞机大战</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0a0a23;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        #gameCanvas {
            border: 2px solid #00ffff;
            background: #000;
            cursor: none;
        }
        #info {
            font-size: 20px;
            margin: 10px 0;
            display: flex;
            gap: 30px;
        }
        h1 {
            margin: 5px 0;
            color: #00ffff;
        }
    </style>
</head>
<body>
    <h1>✈️ 飞机大战</h1>
    <div id="info">
        <span>分数: <span id="score">0</span></span>
        <span>生命: <span id="lives">3</span></span>
        <span>等级: <span id="level">1</span></span>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        // ===================== 有节奏的背景音乐 =====================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let bgTimer;
        let isMusicStarted = false;

        function playNote(freq, dur, delay = 0, vol = 0.2) {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "square";
                osc.frequency.value = freq;
                gain.gain.value = vol;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                osc.stop(audioCtx.currentTime + dur + 0.01);
            }, delay * 1000);
        }

        function playBeatLoop() {
            if (bgTimer) clearInterval(bgTimer);
            const bpm = 140;
            const spm = 60 / bpm;
            const loop = () => {
                const t = 0;
               const step = spm;
                playNote(330, step*0.9, t);
                playNote(330, step*0.9, t + step);
                playNote(440, step*0.9, t + step*2);
                playNote(330, step*0.9, t + step*3);
                playNote(220, step*0.9, t + step*4);
                playNote(220, step*0.9, t + step*5);
                playNote(330, step*0.9, t + step*6);
                playNote(220, step*0.9, t + step*7);
            };
            loop();
            bgTimer = setInterval(loop, spm * 8 * 1000);
        }

        function startMusic() {
            if (isMusicStarted) return;
            isMusicStarted = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playBeatLoop();
        }

        // 开火音效：空（静音）
        function playShoot() {}
        // 爆炸 & 道具音效保留
        function playExplode() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 180;
            gain.gain.value = 0.3;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.stop(audioCtx.currentTime + 0.35);
        }
        function playPowerup() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 880;
            gain.gain.value = 0.3;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // ===================== 游戏逻辑 =====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level');

        let score = 0;
        let lives = 3;
        let level = 1;
        let gameLoop;
        let isPaused = false;

        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 60,
            width: 50,
            height: 40,
            speed: 5,
            color: '#00ff00',
            bullets: []
        };

        let enemies = [];
        const enemySpeed = 2;
        let enemySpawnTimer = 0;
        const enemySpawnInterval = 60;

        let enemyBullets = [];
        let powerups = [];
        const powerupSpawnInterval = 300;
        let powerupTimer = 0;

        const keys = {};

        // 第一次交互启动音乐
        function firstInteraction() {
            startMusic();
        }
        document.addEventListener('click', firstInteraction);
        document.addEventListener('keydown', firstInteraction);

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') shoot();
            if (e.key === 'p' || e.key === 'P') isPaused = !isPaused;
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.width / 2;
            player.y = e.clientY - rect.top - player.height / 2;
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;
        });

        function shoot() {
            if (isPaused) return;
            playShoot();
            player.bullets.push({
                x: player.x + player.width / 2 - 2,
                y: player.y,
                width: 4,
                height: 15,
                speed: 7,
                color: '#ffff00'
            });
        }

        function enemyShoot(enemy) {
            if (Math.random() < 0.01) {
                enemyBullets.push({
                    x: enemy.x + enemy.width / 2 - 2,
                    y: enemy.y + enemy.height,
                    width: 4,
                    height: 15,
                    speed: 5,
                    color: '#ff4444'
                });
            }
        }

        function spawnEnemy() {
            const size = Math.random() < 0.3 ? 40 : 30;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                speed: enemySpeed + level * 0.5,
                color: size === 40 ? '#ff4444' : '#ff8800',
                hp: size === 40 ? 3 : 1
            });
        }

        function spawnPowerup() {
            const types = ['speed', 'multishot', 'shield'];
            const type = types[Math.floor(Math.random() * types.length)];
            powerups.push({
                x: Math.random() * (canvas.width - 30),
                y: -30,
                width: 30,
                height: 30,
                speed: 3,
                type: type,
                color: type === 'speed' ? '#00ffff' : type === 'multishot' ? '#ff00ff' : '#ffff00'
            });
        }

        function rectCollision(r1, r2) {
            return (
                r1.x < r2.x + r2.width &&
                r1.x + r1.width > r2.x &&
                r1.y < r2.y + r2.height &&
                r1.y + r1.height > r2.y
            );
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width/2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();
        }

        function drawBullets() {
            player.bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });
            enemyBullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });
        }

        function drawEnemies() {
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.width, e.height);
                if (e.hp > 1) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '12px Arial';
                    ctx.fillText(e.hp, e.x + e.width/2 - 5, e.y + e.height/2 + 5);
                }
            });
        }

        function drawPowerups() {
            powerups.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x + p.width/2, p.y + p.height/2, p.width/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();
            });
        }

        function update() {
            if (isPaused) return;

            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += player.speed;

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;

            player.bullets = player.bullets.filter(b => {
                b.y -= b.speed;
                return b.y > -b.height;
            });

            enemyBullets = enemyBullets.filter(b => {
                b.y += b.speed;
                return b.y < canvas.height;
            });

            enemySpawnTimer++;
            if (enemySpawnTimer >= enemySpawnInterval - level * 5) {
                spawnEnemy();
                enemySpawnTimer = 0;
            }

            powerupTimer++;
            if (powerupTimer >= powerupSpawnInterval) {
                spawnPowerup();
                powerupTimer = 0;
            }

            enemies = enemies.filter(e => {
                e.y += e.speed;
                enemyShoot(e);
                return e.y < canvas.height;
            });

            powerups = powerups.filter(p => {
                p.y += p.speed;
                return p.y < canvas.height;
            });

            player.bullets.forEach((b, bi) => {
                enemies.forEach((e, ei) => {
                    if (rectCollision(b, e)) {
                        e.hp--;
                        player.bullets.splice(bi, 1);
                        if (e.hp <= 0) {
                            playExplode();
                            enemies.splice(ei, 1);
                            score += e.width === 40 ? 50 : 10;
                        }
                    }
                });
            });

            enemyBullets.forEach((b, bi) => {
                if (rectCollision(b, player)) {
                    enemyBullets.splice(bi, 1);
                    lives--;
                    livesEl.textContent = lives;
                    if (lives <= 0) {
                        clearInterval(gameLoop);
                        alert(`游戏结束！\n最终分数: ${score}\n最高等级: ${level}`);
                        if (confirm('是否重新开始？')) resetGame();
                    }
                }
            });

            enemies.forEach((e, ei) => {
                if (rectCollision(e, player)) {
                    enemies.splice(ei, 1);
                    lives--;
                    livesEl.textContent = lives;
                    if (lives <= 0) {
                        clearInterval(gameLoop);
                        alert(`游戏结束！\n最终分数: ${score}\n最高等级: ${level}`);
                        if (confirm('是否重新开始？')) resetGame();
                    }
                }
            });

            powerups.forEach((p, pi) => {
                if (rectCollision(p, player)) {
                    playPowerup();
                    powerups.splice(pi, 1);
                    if (p.type === 'speed') player.speed += 2;
                    if (p.type === 'multishot') {
                        const oldShoot = shoot;
                        shoot = () => {
                            if (isPaused) return;
                            playShoot();
                            player.bullets.push({x: player.x + player.width/2 - 8, y: player.y, width: 4, height: 15, speed: 7, color: '#ffff00'});
                            player.bullets.push({x: player.x + player.width/2 + 4, y: player.y, width: 4, height: 15, speed: 7, color: '#ffff00'});
                            player.bullets.push({x: player.x + player.width/2 - 2, y: player.y, width: 4, height: 15, speed: 7, color: '#ffff00'});
                        };
                        setTimeout(() => { shoot = oldShoot; }, 5000);
                    }
                    if (p.type === 'shield') {
                        player.color = '#00ffff';
                        setTimeout(() => { player.color = '#00ff00'; }, 3000);
                    }
                }
            });

            scoreEl.textContent = score;
            levelEl.textContent = level;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPlayer();
            drawBullets();
            drawEnemies();
            drawPowerups();
            update();
        }

        function resetGame() {
            score = 0;
            lives = 3;
            level = 1;
            player.x = canvas.width / 2 - 25;
            player.y = canvas.height - 60;
            player.bullets = [];
            player.speed = 5;
            player.color = '#00ff00';
            enemies = [];
            enemyBullets = [];
            powerups = [];
            enemySpawnTimer = 0;
            powerupTimer = 0;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            levelEl.textContent = level;
            gameLoop = setInterval(draw, 1000/60);
        }

        gameLoop = setInterval(draw, 1000/60);
    </script>
</body>
</html>
