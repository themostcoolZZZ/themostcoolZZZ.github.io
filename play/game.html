<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>贪吃蛇小游戏</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        #gameCanvas {
            border: 2px solid #fff;
            background: #000;
        }
        #score {
            font-size: 24px;
            margin: 15px 0;
        }
        h1 {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🎮 贪吃蛇小游戏</h1>
    <div id="score">分数: 0</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const blockSize = 20;
        const width = canvas.width / blockSize;
        const height = canvas.height / blockSize;
        
        let snake = [{x: 10, y: 10}];
        let dx = 1;
        let dy = 0;
        let food = {x: 15, y: 15};
        let score = 0;
        let gameLoop;

        // 绘制蛇
        function drawSnake() {
            snake.forEach(segment => {
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(segment.x * blockSize, segment.y * blockSize, blockSize - 1, blockSize - 1);
            });
        }

        // 绘制食物
        function drawFood() {
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(food.x * blockSize, food.y * blockSize, blockSize - 1, blockSize - 1);
        }

        // 移动蛇
        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = `分数: ${score}`;
                generateFood();
            } else {
                snake.pop();
            }

            // 碰撞检测
            if (head.x < 0 || head.x >= width || head.y < 0 || head.y >= height || checkCollision(head)) {
                clearInterval(gameLoop);
                alert(`游戏结束！最终分数: ${score}\n按F5刷新重新开始`);
            }
        }

        // 生成新食物
        function generateFood() {
            food = {
                x: Math.floor(Math.random() * width),
                y: Math.floor(Math.random() * height)
            };
            // 避免食物生成在蛇身上
            while (snake.some(seg => seg.x === food.x && seg.y === food.y)) {
                food = {
                    x: Math.floor(Math.random() * width),
                    y: Math.floor(Math.random() * height)
                };
            }
        }

        // 检查是否撞到自己
        function checkCollision(head) {
            return snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y);
        }

        // 游戏主循环
        function gameUpdate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawSnake();
            drawFood();
            moveSnake();
        }

        // 方向控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && dx !== 1) {
                dx = -1;
                dy = 0;
            }
            if (e.key === 'ArrowRight' && dx !== -1) {
                dx = 1;
                dy = 0;
            }
            if (e.key === 'ArrowUp' && dy !== 1) {
                dx = 0;
                dy = -1;
            }
            if (e.key === 'ArrowDown' && dy !== -1) {
                dx = 0;
                dy = 1;
            }
        });

        // 启动游戏
        gameLoop = setInterval(gameUpdate, 100);
    </script>
</body>
</html>
